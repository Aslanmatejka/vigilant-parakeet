version: '3.8'

services:
  # Frontend application
  app:
    build: .
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - ai-backend
    networks:
      - dogoods-network

  # AI Backend (FastAPI + OpenAI)
  # Talks to the Supabase project configured via .env (SUPABASE_URL +
  # SUPABASE_SERVICE_ROLE_KEY). For a local Supabase stack, run
  # `npx supabase start` on the host (no docker service needed).
  ai-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - dogoods-network

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dogoods-network

volumes:
  redis_data:

networks:
  dogoods-network:
    driver: bridge 