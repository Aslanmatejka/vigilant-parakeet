[build]
  command = "npm run build"
  publish = "dist"

# Environment variables should be set in Netlify dashboard, not here
# SECURITY: Never commit secrets to git!
# Required variables:
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY  
#   VITE_MAPBOX_TOKEN

# Proxy AI API to Railway backend
[[redirects]]
  from = "/api/ai/*"
  to = "https://dogoods-backend-production.up.railway.app/api/ai/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/favicon.*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
